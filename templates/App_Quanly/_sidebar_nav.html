{% load static %}
<div class="glass-panel p-3">
    <div class="card-body">
        <div class="admin-tenant-card mb-3">
            <div class="d-flex align-items-center gap-2">
                <div class="admin-tenant-logo-wrap">
                    <img class="admin-tenant-logo" src="{% static 'images/logo/eapp.png' %}" alt="eApp FnB">
                </div>
                <div class="admin-tenant-text min-w-0">
                    <div class="fw-bold">eApp FnB</div>
                    <div class="small opacity-75 text-truncate">{{ user.tenant.name|default:'Doanh nghiệp' }}</div>
                </div>
            </div>
        </div>

        <div class="admin-section-title">Điều hướng</div>
        <div class="d-flex flex-column gap-1">
            <a class="admin-nav-link {% if request.path == '/quanly/' %}active{% endif %}" href="{% url 'App_Quanly:dashboard' %}" title="Dashboard" data-quanly-tip="Dashboard">
                <i class="bi bi-speedometer2" aria-hidden="true"></i><span class="admin-nav-label">Dashboard</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/stores/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:stores' %}" title="Cửa hàng" data-quanly-tip="Cửa hàng">
                <i class="bi bi-shop" aria-hidden="true"></i><span class="admin-nav-label">Cửa hàng</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/orders/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:orders' %}" title="Lịch sử đơn" data-quanly-tip="Lịch sử đơn">
                <i class="bi bi-receipt-cutoff" aria-hidden="true"></i><span class="admin-nav-label">Lịch sử đơn</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/categories/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:categories' %}" title="Danh mục" data-quanly-tip="Danh mục">
                <i class="bi bi-grid-3x3-gap" aria-hidden="true"></i><span class="admin-nav-label">Danh mục</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/products/' in request.path or '/quanly/units/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:products' %}" title="Sản phẩm" data-quanly-tip="Sản phẩm">
                <i class="bi bi-cup-hot" aria-hidden="true"></i><span class="admin-nav-label">Sản phẩm</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/toppings/' in request.path or '/quanly/product-toppings/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:toppings' %}" title="Topping" data-quanly-tip="Topping">
                <i class="bi bi-plus-circle" aria-hidden="true"></i><span class="admin-nav-label">Topping</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/qr-tables/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:qr_tables' %}" title="QR bàn" data-quanly-tip="QR bàn">
                <i class="bi bi-qr-code-scan" aria-hidden="true"></i><span class="admin-nav-label">QR bàn</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/payment-qr/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:payment_qr_settings' %}" title="QR thanh toán" data-quanly-tip="QR thanh toán">
                <i class="bi bi-credit-card-2-front" aria-hidden="true"></i><span class="admin-nav-label">QR thanh toán</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/staffs/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:staffs' %}" title="Nhân viên" data-quanly-tip="Nhân viên">
                <i class="bi bi-people" aria-hidden="true"></i><span class="admin-nav-label">Nhân viên</span>
            </a>
            <a class="admin-nav-link {% if '/quanly/account/' in request.path %}active{% endif %}" href="{% url 'App_Quanly:account' %}" title="Tài khoản" data-quanly-tip="Tài khoản">
                <i class="bi bi-person-circle" aria-hidden="true"></i><span class="admin-nav-label">Tài khoản</span>
            </a>
        </div>

        <hr class="my-3">
        <div class="admin-section-title">Liên kết nhanh</div>
        <div class="d-flex flex-column gap-1">
            {% if user.tenant %}
            <a class="admin-nav-link" href="{% url 'App_Public:tenant_catalog' user.tenant.public_slug %}" target="_blank" rel="noopener" title="Public catalog" data-quanly-tip="Public catalog">
                <i class="bi bi-globe2" aria-hidden="true"></i><span class="admin-nav-label">Public catalog</span>
                <i class="bi bi-box-arrow-up-right ms-auto" aria-hidden="true"></i>
            </a>
            {% endif %}
            <a class="admin-nav-link" href="{% url 'App_Sales:pos' %}" target="_blank" rel="noopener" title="Về POS" data-quanly-tip="Về POS">
                <i class="bi bi-arrow-left-circle" aria-hidden="true"></i><span class="admin-nav-label">Về POS</span>
                <i class="bi bi-box-arrow-up-right ms-auto" aria-hidden="true"></i>
            </a>
        </div>
    </div>
</div>
